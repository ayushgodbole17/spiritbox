name: Deploy Spiritbox

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_REGION: asia-south1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE_NAME: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/spiritbox/spiritbox

jobs:
  # ---------------------------------------------------------------------------
  # 1. Test
  # ---------------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          OPENAI_API_KEY: test-key
          LANGFUSE_PUBLIC_KEY: test-pub
          LANGFUSE_SECRET_KEY: test-sec
          WEAVIATE_URL: http://localhost:8081
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/spiritbox
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: test-password
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # 2. Build & push Docker image
  # ---------------------------------------------------------------------------
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # ---------------------------------------------------------------------------
  # 3. Deploy to Cloud Run
  # ---------------------------------------------------------------------------
  deploy-api:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy spiritbox-api \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --add-cloudsql-instances spiritbox-491411:asia-south1:spiritbox-db \
            --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_REGION=${{ env.GCP_REGION }},WEAVIATE_URL=https://tak7r6r4qjk1cvgtumoyaw.c0.asia-southeast1.gcp.weaviate.cloud,LANGFUSE_HOST=https://cloud.langfuse.com" \
            --set-secrets "\
              OPENAI_API_KEY=openai-api-key:latest,\
              DATABASE_URL=database-url:latest,\
              ADMIN_USERNAME=admin-username:latest,\
              ADMIN_PASSWORD=admin-password:latest,\
              WEAVIATE_API_KEY=weaviate-api-key:latest,\
              LANGFUSE_PUBLIC_KEY=langfuse-public-key:latest,\
              LANGFUSE_SECRET_KEY=langfuse-secret-key:latest"

  # ---------------------------------------------------------------------------
  # 4. Deploy Cloud Function
  # ---------------------------------------------------------------------------
  deploy-function:
    name: Deploy send_reminder Cloud Function
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy send-reminder \
            --gen2 \
            --runtime python311 \
            --region ${{ env.GCP_REGION }} \
            --source functions/send_reminder \
            --entry-point send_reminder \
            --trigger-http \
            --allow-unauthenticated \
            --set-secrets "SENDGRID_API_KEY=sendgrid-api-key:latest" \
            --set-env-vars "FIRESTORE_COLLECTION_EVENTS=events,GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}"
