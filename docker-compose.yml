version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: spiritbox-db
    environment:
      POSTGRES_USER: spiritbox
      POSTGRES_PASSWORD: spiritbox
      POSTGRES_DB: spiritbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spiritbox"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # Spiritbox API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spiritbox-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spiritbox:spiritbox@db:5432/spiritbox
      AUTO_CREATE_TABLES: "true"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Mount source for local hot-reload (remove in production)
      - .:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]

  # ---------------------------------------------------------------------------
  # Spiritbox Frontend (React + Vite)
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - '3000:3000'
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
